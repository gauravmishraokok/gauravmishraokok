name: Update LeetCode SVG

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: node scripts/generate-leetcode.js

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add assets/leetcode.svg
          git diff --cached --quiet || git commit -m "update leetcode svg"
          git push