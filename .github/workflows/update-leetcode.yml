name: Update LeetCode SVG

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Required to allow the bot to commit and push changes
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        run: node scripts/generate-leetcode.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/leetcode.svg
          git diff --cached --quiet || git commit -m "chore: update leetcode svg"
          git push