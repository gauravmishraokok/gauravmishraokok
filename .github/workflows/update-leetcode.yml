name: Update LeetCode SVG

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: npm install node-fetch

      - run: node scripts/generate-leetcode.js

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add assets/leetcode.svg
          git commit -m "update leetcode svg" || echo "no changes"
          git push